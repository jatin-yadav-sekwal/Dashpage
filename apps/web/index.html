<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashpage — Your Digital Business Card</title>
    <meta name="description" content="Create a stunning portfolio page and digital business card. Share your work, connect with others." />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- Preconnect to external origins for faster connection -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Preload critical fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Critical CSS - render blocking */
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
      #root { min-height: 100vh; }
      
      /* Avatar skeleton - reserve space before image loads */
      .avatar-skeleton {
        width: 6rem;
        height: 6rem;
        min-width: 6rem;
        min-height: 6rem;
        border-radius: 9999px;
        background-color: #e2e8f0;
      }
      @media (min-width: 640px) {
        .avatar-skeleton {
          width: 8rem;
          height: 8rem;
          min-width: 8rem;
          min-height: 8rem;
        }
      }
      
      /* Font display swap for faster text rendering */
      @font-face {
        font-family: 'Inter';
        font-display: swap;
      }
      @font-face {
        font-family: 'Poppins';
        font-display: swap;
      }
      
      /* Skeleton loading animation */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
